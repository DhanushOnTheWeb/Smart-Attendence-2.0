<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance System | Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --teacher-color: #4f46e5;
      --student-color: #10b981;
      --glass-bg: rgba(255, 255, 255, 0.95);
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif; 
      background: var(--primary-gradient); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated background elements for extra UX depth */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      z-index: -1;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.1); }
    }

    .container { 
      text-align: center; 
      background: var(--glass-bg); 
      padding: 60px 40px; 
      border-radius: 30px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(10px);
    }

    h1 { 
      margin-bottom: 10px; 
      color: #1e293b; 
      font-weight: 700; 
      font-size: 2rem;
    }

    p {
      color: #64748b;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .portal-links { 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
    }

    a { 
      padding: 18px; 
      text-decoration: none; 
      color: white; 
      border-radius: 12px; 
      font-weight: 600; 
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .teacher-btn { background: var(--teacher-color); }
    .student-btn { background: var(--student-color); }

    a:hover { 
      opacity: 1; 
      transform: translateY(-4px); 
      box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    }

    .teacher-btn:hover { background: #4338ca; }
    .student-btn:hover { background: #059669; }

    /* Small footer text */
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="bg-circle" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
  <div class="bg-circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 2s;"></div>

  <div class="container">
    <div style="font-size: 3rem; margin-bottom: 20px;">🎓</div>
    <h1>Attendance System</h1>
    <p>Select your portal to continue</p>
    
    <div class="portal-links">
      <a href="teachers.html" class="teacher-btn">
        Teacher Portal
      </a>
      <a href="student.html" class="student-btn">
        Student Portal
      </a>
    </div>

    <div class="footer">
      Powered by Smart Attendance Tech © 2026
    </div>
  </div>
</body>
</html>
