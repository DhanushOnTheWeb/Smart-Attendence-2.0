<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Smart Attendance</title>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper { width: 100%; max-width: 900px; z-index: 1; }

        /* Glassmorphism Card Style */
        .card { 
            background: var(--glass-bg); 
            padding: 30px; 
            border-radius: 24px; 
            margin-bottom: 24px; 
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        h2, h3 { font-weight: 700; color: var(--text-main); margin-top: 0; }

        .admin-nav { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .admin-nav a { 
            text-decoration: none; 
            font-size: 14px; 
            color: white; 
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }
        .admin-nav a:hover { background: rgba(255, 255, 255, 0.4); transform: translateY(-2px); }

        input, select, button { 
            padding: 14px; 
            margin: 8px 0; 
            width: 100%; 
            border-radius: 12px; 
            border: 1px solid rgba(0, 0, 0, 0.1); 
            font-size: 14px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        button:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4); }

        .filter-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
        }

        label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Status Colors */
        .manager-card.add-section { border-top: 5px solid var(--success); }
        .manager-card.delete-section { border-top: 5px solid var(--danger); }

        .student-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 18px; 
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .action-btns { display: flex; gap: 10px; }
        .btn-p { background: var(--success); width: 50px; }
        .btn-a { background: var(--danger); width: 50px; }
        .btn-d { background: #64748b; width: 50px; }
        
        .status-text { font-weight: 800; text-transform: uppercase; font-size: 14px; }

        #dashboard, #adminTools { display: none; }
        
        .login-footer { text-align: center; margin-top: 20px; font-size: 14px; }
        .login-footer a { color: var(--primary); font-weight: 700; text-decoration: none; }

        /* Floating Background Circles */
        .circles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; }
        .circles li { position: absolute; display: block; list-style: none; width: 20px; height: 20px; background: rgba(255, 255, 255, 0.2); animation: animate 25s linear infinite; bottom: -150px; border-radius: 50%; }
        @keyframes animate { 0%{ transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; } 100%{ transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; } }
    </style>
</head>
<body>
    <ul class="circles"><li></li><li></li><li></li><li></li><li></li></ul>

    <div class="wrapper">
        <div id="loginBox" class="card">
            <h2 style="text-align:center">Teacher Portal</h2>
            <p style="text-align:center; color: var(--text-muted); margin-bottom: 30px;">Access your dashboard to manage sessions.</p>
            <input type="text" id="uid" placeholder="Teacher Unique ID">
            <input type="password" id="psw" placeholder="Password">
            <button onclick="login()">Sign In</button>
            <div class="login-footer">
                New here? <a href="register.html">Create an account</a>
            </div>
        </div>

        <div id="dashboard">
            <div class="admin-nav" id="adminTools">
                <a href="import.html">📥 Bulk Student Import</a>
            </div>
            
            <div class="card">
                <h3 id="welcomeMsg" style="margin-bottom: 5px;">Welcome back,</h3>
                <span id="currentDateDisplay"></span>
            </div>

            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 24px;">
                <div id="addManager" class="card manager-card add-section" style="flex: 1; min-width: 300px; margin-bottom: 0;">
                    <h3 style="color: #065f46; font-size: 18px;">➕ Create Subject</h3>
                    <div class="filter-grid">
                        <select id="addDeg"><option>BCA</option><option>BBA</option><option>BCOM</option></select>
                        <select id="addSem"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
                    </div>
                    <input type="text" id="addName" placeholder="Subject Name">
                    <button onclick="addSubject()" style="background: var(--success)">Save Subject</button>
                </div>

                <div id="deleteManager" class="card manager-card delete-section" style="flex: 1; min-width: 300px; margin-bottom: 0;">
                    <h3 style="color: #991b1b; font-size: 18px;">🗑️ Remove Subject</h3>
                    <div class="filter-grid">
                        <select id="delDeg" onchange="syncDeleteSubjects()"><option>BCA</option><option>BBA</option><option>BCOM</option></select>
                        <select id="delSem" onchange="syncDeleteSubjects()"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
                    </div>
                    <select id="delSubjectList"><option value="">-- Select Subject --</option></select>
                    <button onclick="deleteSubject()" style="background: var(--danger)">Delete Permanently</button>
                </div>
            </div>

            <div class="card">
                <h3>Mark Attendance</h3>
                <div class="filter-grid">
                    <div>
                        <label>Select Course</label>
                        <select id="deg" onchange="updateMarkingSubjects()"><option value="BCA">BCA</option><option value="BBA">BBA</option><option value="BCOM">BCOM</option></select>
                    </div>
                    <div>
                        <label>Semester</label>
                        <select id="sem" onchange="updateMarkingSubjects()"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
                    </div>
                    <div>
                        <label>Section</label>
                        <select id="sec"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                    </div>
                    <div>
                        <label>Subject</label>
                        <select id="subject"><option value="">-- Select Subject --</option></select>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <label>Attendance Date</label>
                    <input type="text" id="date" placeholder="Select Session Date">
                </div>
                <button onclick="loadStudents()" style="margin-top: 20px;">Load Student List</button>
                <div id="list" style="margin-top: 30px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Keep your existing script logic exactly as it is
        let teacherId = "";
        flatpickr("#date", { defaultDate: "today", dateFormat: "Y-m-d" });
        document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        async function login() {
            const uniqueId = document.getElementById('uid').value;
            const password = document.getElementById('psw').value;
            const res = await fetch('http://localhost:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uniqueId, password })
            });

            if (res.ok) {
                const data = await res.json();
                teacherId = data.uniqueId;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('adminTools').style.display = 'flex';
                document.getElementById('welcomeMsg').innerText = `Welcome back, Prof. ${data.name}`;
                syncDeleteSubjects();
                updateMarkingSubjects();
            } else alert("Invalid Credentials");
        }

        async function addSubject() {
            const name = document.getElementById('addName').value;
            const degree = document.getElementById('addDeg').value;
            const semester = document.getElementById('addSem').value;
            if (!name) return alert("Please enter subject name");

            const res = await fetch('http://localhost:5000/api/subjects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, degree, semester })
            });
            if (res.ok) {
                alert("Subject Added Successfully");
                document.getElementById('addName').value = "";
                syncDeleteSubjects();
                updateMarkingSubjects();
            }
        }

        async function syncDeleteSubjects() {
            const deg = document.getElementById('delDeg').value;
            const sem = document.getElementById('delSem').value;
            const res = await fetch(`http://localhost:5000/api/subjects?degree=${deg}&semester=${sem}`);
            const subjects = await res.json();
            const list = document.getElementById('delSubjectList');
            list.innerHTML = '<option value="">-- Select Subject --</option>';
            subjects.forEach(s => list.innerHTML += `<option value="${s._id}">${s.name}</option>`);
        }

        async function deleteSubject() {
            const id = document.getElementById('delSubjectList').value;
            if (!id || !confirm("Are you sure you want to delete this subject?")) return;
            const res = await fetch(`http://localhost:5000/api/subjects/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Subject Removed");
                syncDeleteSubjects();
                updateMarkingSubjects();
            }
        }

        async function updateMarkingSubjects() {
            const deg = document.getElementById('deg').value;
            const sem = document.getElementById('sem').value;
            const res = await fetch(`http://localhost:5000/api/subjects?degree=${deg}&semester=${sem}`);
            const subjects = await res.json();
            const subDropdown = document.getElementById('subject');
            subDropdown.innerHTML = '<option value="">-- Select Subject --</option>';
            subjects.forEach(s => subDropdown.innerHTML += `<option value="${s.name}">${s.name}</option>`);
        }

        async function loadStudents() {
            const q = `degree=${document.getElementById('deg').value}&semester=${document.getElementById('sem').value}&section=${document.getElementById('sec').value}`;
            const res = await fetch(`http://localhost:5000/students?${q}`);
            const students = await res.json();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = students.length ? '' : '<p style="text-align:center; color:white;">No students found for this selection.</p>';
            students.forEach(s => {
                listDiv.innerHTML += `
                    <div class="student-row">
                        <span class="student-name">${s.name} <br><small style="color:var(--text-muted)">${s.uniqueId}</small></span>
                        <div class="action-btns" id="action-${s._id}">
                            <button class="btn-p" onclick="mark('${s._id}','present')">P</button>
                            <button class="btn-a" onclick="mark('${s._id}','absent')">A</button>
                            <button class="btn-d" title="Clear" onclick="clearAttendance('${s._id}')">✕</button>
                        </div>
                    </div>`;
            });
        }

        async function mark(studentId, status) {
            await fetch('http://localhost:5000/attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    studentId, 
                    subjectName: document.getElementById('subject').value, 
                    status, 
                    date: document.getElementById('date').value, 
                    teacherId 
                })
            });
            updateRowStatus(studentId, status);
        }

        async function clearAttendance(studentId) {
            const subjectName = document.getElementById('subject').value;
            const date = document.getElementById('date').value;
            if(!subjectName) return alert("Select a subject first");
            if(!confirm("Reset attendance for this student?")) return;

            const res = await fetch(`http://localhost:5000/attendance?studentId=${studentId}&subjectName=${subjectName}&date=${date}`, {
                method: 'DELETE'
            });

            if(res.ok) {
                document.getElementById(`action-${studentId}`).innerHTML = `
                    <button class="btn-p" onclick="mark('${studentId}','present')">P</button>
                    <button class="btn-a" onclick="mark('${studentId}','absent')">A</button>
                    <button class="btn-d" title="Clear" onclick="clearAttendance('${studentId}')">✕</button>
                `;
            }
        }

        function updateRowStatus(studentId, status) {
            const container = document.getElementById(`action-${studentId}`);
            const color = status === 'present' ? 'var(--success)' : 'var(--danger)';
            container.innerHTML = `
                <span class="status-text" style="margin-right:12px; color:${color}">${status}</span>
                <button class="btn-d" title="Clear" onclick="clearAttendance('${studentId}')">✕</button>
            `;
        }
    </script>
</body>
</html>
